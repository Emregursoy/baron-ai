<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaronAI | El Türco</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Georgia', serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 8px; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.5); }
        p { color: #888; font-style: italic; }
        .card { border: 1px solid #d4af37; padding: 30px; margin: 20px auto; width: 80%; max-width: 400px; background: rgba(20, 20, 20, 0.8); border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input[type="file"] { margin: 20px 0; color: #888; }
        button { background: linear-gradient(45deg, #d4af37, #f2d479); color: black; border: none; padding: 15px 40px; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 2px; transition: 0.3s; }
    </style>
</head>
<body>
    <h1>BARON AI</h1>
    <p>"Sadakat paradan daha değerlidir."</p>
    <div class="card">
        <h3>DÖNÜŞÜMÜ BAŞLAT</h3>
        <input type="file" id="imageInput" accept="image/*">
        <br><br>
        <button onclick="alert('BaronAI: Sistem El Türco tarafından kuruluyor. API bağlantısı bir sonraki adımda!')">OPERASYONU BAŞLAT</button>
    </div>
</body>
</html>
