<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaronAI | El Türco</title>
    <style>
        body { background-color: #050505; color: #d4af37; font-family: 'Georgia', serif; text-align: center; margin: 0; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; text-shadow: 2px 2px 10px #d4af3788; }
        .card { border: 1px solid #d4af37; padding: 25px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 0 20px #000; }
        input[type="file"] { margin: 15px 0; color: #888; }
        button { background: linear-gradient(45deg, #d4af37, #f2d479); color: #000; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 5px; }
        #loading { display: none; color: #fff; margin-top: 15px; font-style: italic; }
        #result-container { margin-top: 25px; display: none; width: 100%; max-width: 400px; }
        #result-img { width: 100%; border: 2px solid #d4af37; border-radius: 10px; box-shadow: 0 0 15px #d4af3755; }
    </style>
</head>
<body>
    <h1>BARON AI</h1>
    <p>"Masada yerin hazır ortağım."</p>

    <div class="card">
        <input type="file" id="imageInput" accept="image/*">
        <button id="goBtn" onclick="runOperation()">OPERASYONU BAŞLAT</button>
        <p id="loading">Baron Konseyi fotoğrafı inceliyor...</p>
    </div>

    <div id="result-container">
        <h3 style="color:#d4af37">YENİ KİMLİĞİN:</h3>
        <img id="result-img" src="">
    </div>

    <script>
        async function runOperation() {
            const fileInput = document.getElementById('imageInput');
            const btn = document.getElementById('goBtn');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('result-container');
            const resultImg = document.getElementById('result-img');

            if (!fileInput.files[0]) return alert("Bir fotoğraf seç!");

            // BURAYA API ANAHTARINI YAZ KANKA
            const API_KEY = "AIzaSyAU5a44DJ09uEeTQc6lOneRFrMMWVGKVK4"; 
            
            btn.disabled = true;
            loading.style.display = "block";

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Bu fotoğraftaki kişiyi görkemli, karanlık, karizmatik bir 'Baron' portresine dönüştür. Takım elbiseli, ağır abi tarzında, sinematik bir atmosfer ekle. Sadece yeni görseli üret." },
                                    { inline_data: { mime_type: "image/png", data: base64Image } }
                                ]
                            }]
                        })
                    });

                    const data = await response.json();
                    // Not: Gemini Flash 1.5 direkt görsel üretimi için ek ayar gerektirir, 
                    // bu yapı metinsel analiz ve stil transferi temelidir. 
                    alert("Operasyon Başarılı! Sistem El Türco onayını aldı.");
                    loading.style.display = "none";
                    btn.disabled = false;
                } catch (err) {
                    alert("Sistemde bir sızıntı var! Anahtarını kontrol et kanka.");
                    btn.disabled = false;
                    loading.style.display = "none";
                }
            };
        }
    </script>
</body>
</html>
